version: '3'

services:

  db:
    image: mysql:5.7
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasksdb
    ports:
      - "3307:3306"

  backend:
    build: ./backend
    container_name: flask-api
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend